{{- if and (.Param "ShowPageViewCount") (eq .Section "posts") }}
<div style="font-size: 0.85rem; color: var(--secondary); margin-top: 0.5rem;">
  <span id="busuanzi_value_page_pv">--</span>&nbsp;次阅读
</div>
{{- end }}

{{- if eq .Kind "page" }}
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

  function currentMermaidTheme() {
    return document.documentElement.dataset.theme === "dark" ? "dark" : "default";
  }

  async function renderMermaid() {
    mermaid.initialize({ startOnLoad: false, theme: currentMermaidTheme() });
    const nodes = document.querySelectorAll("pre.mermaid");
    if (!nodes.length) return;
    nodes.forEach((el) => {
      if (!el.dataset.original) el.dataset.original = el.textContent;
      el.removeAttribute("data-processed");
      el.innerHTML = el.dataset.original;
    });
    await mermaid.run({ nodes });
  }

  renderMermaid();

  new MutationObserver(renderMermaid).observe(document.documentElement, {
    attributes: true,
    attributeFilter: ["data-theme"],
  });
</script>
{{- end }}
